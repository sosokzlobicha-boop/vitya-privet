<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTVitya | Cabinet</title>
    <style>
        /* ЗАЩИТА ОТ КОПИРОВАНИЯ И ВЫДЕЛЕНИЯ */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none; /* Запрет меню на iOS */
            user-select: none; /* Запрет выделения текста */
        }

        img {
            pointer-events: none; /* Картинку нельзя кликнуть или зажать */
            -webkit-user-drag: none; /* Запрет перетаскивания */
        }

        ::selection { background: #ffffff; color: #000; }

        :root {
            --bg: #050505; --card: #0d0d0d; --border: #1a1a1a;
            --accent: #ffffff; --text-dim: #666; --gold: #ffd700; --success: #00ff88;
        }

        @keyframes reveal {
            0% { opacity: 0; filter: blur(20px); transform: translateY(15px) scale(0.98); }
            100% { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); }
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* ШАПКА */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000; animation: reveal 0.8s ease forwards;
        }
        .user-top { display: flex; align-items: center; gap: 12px; }
        .top-ava { width: 40px; height: 40px; border-radius: 14px; border: 1px solid var(--border); object-fit: cover; background: #111; }
        .top-name { font-size: 15px; font-weight: 800; letter-spacing: -0.5px; }

        .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 900; }
        .mini-gif { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); }

        /* НАВИГАЦИЯ */
        .nav-menu { display: flex; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-item {
            width: 42px; height: 42px; background: #111; border: 1px solid var(--border);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff; font-weight: 900; font-size: 14px;
        }
        .nav-item.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.1); }

        /* БАЛАНС */
        .balance-card { margin-top: 20px; text-align: center; animation: reveal 1s ease 0.2s forwards; opacity: 0; }
        .coins-val { font-size: 32px; font-weight: 900; color: var(--gold); text-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }

        /* КОНТЕНТ */
        .viewport { flex: 1; padding: 20px; display: none; flex-direction: column; align-items: center; }
        .viewport.active { display: flex; animation: reveal 0.6s ease forwards; }

        /* ИГРА */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 350px; }
        .hole { aspect-ratio: 1/1; background: #0a0a0a; border: 1px solid var(--border); border-radius: 25px; position: relative; overflow: hidden; }
        .hamster { width: 100%; height: 100%; font-size: 50px; display: flex; align-items: center; justify-content: center; position: absolute; transform: translateY(110%); transition: 0.2s; cursor: pointer; }
        .hamster.up { transform: translateY(10%); }

        /* КОЛЛЕКЦИЯ (8 ПРЕДМЕТОВ) */
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; padding-bottom: 100px; }
        .nft-card { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 15px; text-align: center; transition: 0.3s; position: relative; }
        .nft-img-box { width: 100%; aspect-ratio: 1/1; border-radius: 20px; background: #111; margin-bottom: 12px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        .nft-img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        
        .locked .nft-img-box img { filter: blur(25px) brightness(0.3); }
        .lock-badge { position: absolute; z-index: 10; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 10px; backdrop-filter: blur(5px); font-weight: 800; font-size: 11px; color: var(--gold); border: 1px solid var(--border); }

        /* РЕФЕРАЛЫ */
        .ticket { width: 100%; max-width: 320px; height: 180px; background: linear-gradient(135deg, #111, #050505); border: 1px solid var(--border); border-radius: 28px; padding: 30px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; transition: 0.4s; text-align: center; }

        @media (max-width: 768px) {
            .nav-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid var(--border); padding: 15px 0; transform: none; justify-content: center; gap: 45px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
            .header-logo span { display: none; }
            .viewport { padding-bottom: 120px; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- ЗАПРЕТ ПРАВОЙ КНОПКИ МЫШИ -->

    <header class="header">
        <div class="user-top">
            <img id="topAva" class="top-ava" src="">
            <span id="topName" class="top-name">...</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item" onclick="tab('ref')">https://i.postimg.cc/VLg3Gkyf/scanner.png</div>
            <div class="nav-item active" onclick="tab('game')">https://i.postimg.cc/gksfS29m/games.png</div>
            <div class="nav-item" onclick="tab('coll')">https://i.postimg.cc/c4hV9Lqd/image-gallery.png</div>
        </nav>
        <div class="header-logo">
            <img src="https://media.tenor.com/gOVcxQsXm78AAAAi/chomik.gif" class="mini-gif">
            <span>NFTVitya</span>
        </div>
    </header>

    <div class="balance-card">
        <div style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px;">Vitya Coins</div>
        <div class="coins-val"><span id="coinCount">0</span> 🪙</div>
    </div>

    <!-- ТАБ: ИГРА -->
    <main class="viewport active" id="tab-game">
        <div id="timer" style="margin-bottom: 15px; font-weight: 800; color: #ff4444;">30 СЕКУНД</div>
        <div class="game-grid">
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
            <div class="hole"><div class="hamster">🐹</div></div>
        </div>
        <button id="startBtn" onclick="startGame()" style="margin-top:30px; background:#fff; color:#000; border:none; padding:15px 45px; border-radius:18px; font-weight:900; cursor:pointer;">ИГРАТЬ</button>
    </main>

    <!-- ТАБ: КОЛЛЕКЦИЯ -->
    <main class="viewport" id="tab-coll">
        <div class="nft-grid" id="nftGrid"></div>
    </main>

    <!-- ТАБ: РЕФЕРАЛЫ -->
    <main class="viewport" id="tab-ref">
        <div class="ticket" onclick="copyLink()">
            <div style="font-size: 10px; color: var(--text-dim); letter-spacing: 2px;">INVITE PASS</div>
            <div id="refCode" style="font-size: 28px; font-weight: 900; margin: 10px 0;">...</div>
            <div id="copyStat" style="font-size: 11px; color: var(--gold);">Нажми для копирования ссылки</div>
        </div>
    </main>

    <script>
        const user = localStorage.getItem('currentUser');
        if (!user) window.location.href = 'index.html';

        const db = JSON.parse(localStorage.getItem('accounts')) || {};
        const myData = db[user] || {};
        let coins = parseInt(localStorage.getItem(`${user}_coins`)) || 0;
        let owned = JSON.parse(localStorage.getItem(`${user}_nfts`)) || [1];

        document.getElementById('topName').textContent = user;
        document.getElementById('topAva').src = myData.avatar || `https://ui-avatars.com{user}&background=111&color=fff&bold=true`;
        document.getElementById('coinCount').textContent = coins.toLocaleString();
        document.getElementById('refCode').textContent = (user.slice(0,4) + '-' + Math.floor(Math.random()*900+100)).toUpperCase();

        function tab(name) {
            document.querySelectorAll('.viewport').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            event.currentTarget.classList.add('active');
            if(name === 'coll') renderNFTs();
        }

        // ИГРА
        const hamsters = document.querySelectorAll('.hamster');
        let gameOn = false;
        function startGame() {
            if(gameOn) return;
            gameOn = true;
            document.getElementById('startBtn').style.display = 'none';
            let time = 30;
            const t = setInterval(() => {
                time--; document.getElementById('timer').textContent = time + ' СЕКУНД';
                if(time <= 0) { clearInterval(t); gameOn = false; document.getElementById('startBtn').style.display = 'block'; }
            }, 1000);
            peek();
        }
        function peek() {
            const h = hamsters[Math.floor(Math.random()*9)];
            h.classList.add('up');
            setTimeout(() => { h.classList.remove('up'); if(gameOn) peek(); }, 800);
        }
        hamsters.forEach(h => h.addEventListener('click', () => {
            if(h.classList.contains('up')) {
                coins += 10; h.classList.remove('up');
                updateStats();
            }
        }));

        // КОЛЛЕКЦИЯ (8 ПРЕДМЕТОВ)
        const items = [
            { id: 1, name: "Витя", price: 0, img: "https://i.postimg.cc/Prt5LPQh/nk-P56Qaw-MLD5Vm4Uwd-Ie-AKAKar-QJh-Dnry-Zr-WDDo-Sjx-Nc-XQDv-Ku-M9EFYskmsvi35C6ON3d-Qb4E9gkk5nlon-RUb.jpg" },
            { id: 2, name: "Витю Снимают", price: 500, img: "https://i.postimg.cc/sfbFGgFX/0AMUCw-c-Yci-Nzv2W9UVWk-r-YB70Ogm-I66yd-Sz5t3LPQZILa5x-TQh-A0Vl-B3WNkq-IJot3Wv103BNu-KTCk-Kudu-6j-U.jpg" },
            { id: 3, name: "Фотожаба Витя", price: 1500, img: "https://i.postimg.cc/8kx8fz8M/3vd7bv-KMMi8hs-WX87I94XFEVi-z-My2d0v58X4Skwsrjdd-Or-Ut-Auc35-39W-u-Eikg-B-Ro9sw4u-Bftmjpr-ymd-DB85.jpg" },
            { id: 4, name: "Витя Поварёнок", price: 3000, img: "https://i.postimg.cc/44jCHxC9/Kz-Ym-B6-Mr3v-HVcbk-Fs7-Tv-U6Gd-JV-g-Cbv1Bw4pti-RHossv-Souw-Ba4b9tal-HNi-FZKxh-DSq-N6qp7Ni-Kec7zgn-B.jpg" },
            { id: 5, name: "Витя Жаба", price: 7000, img: "https://i.postimg.cc/pV3N5LNp/Qpf2LRhv6N4-2jo2-l6Pd-Uo980j-Pr-PJEyr4Im0z4jd-IUg-OB7v-Dx-VErz-Tq-Gw4Er-Fl-DU8x2VCE5ddi-Mke-JCb-UWEG.jpg" },
            { id: 6, name: "Симфония Вити", price: 15000, img: "https://i.postimg.cc/HWFG8kGj/lnb-Mdu-Ci-QPZC7PQ8gy1BUovoa0d-Htm-P-d-TPab-OFdg0GZ20w-Co-Z-0Lv-V7y-NED-il-f-G6L03yacf-M4im-S76Xbnsc.jpg" },
            { id: 7, name: "Виталий", price: 50000, img: "https://i.postimg.cc/QNvLKdLW/9SFK8z-JXu-Ru-YRU8K5d1Ei-JTu5Xegk-Fu-ESHRZrael-VIYoo-RZLN8SJWs5z-Iz8r-Ks-Rz-B9g5OJz-Cs-H8y-G0Wwsi-U9.jpg" },
            { id: 8, name: "Витя Генерал", price: 80000, img: "https://i.postimg.cc/wxnKRjKB/rlji1uy-GIGf-OPrn-Tr-EU3wvx-Dd-SYk-W3J3-1Ro-O2c-N3p-Wa-X7Pf-Euo6k-G7Vop-Zgw-wsmkm-N-b-ZGqqz-I2FVkxcp.jpg" }
        ];

        function renderNFTs() {
            const grid = document.getElementById('nftGrid');
            grid.innerHTML = items.map(i => {
                const isOwned = owned.includes(i.id);
                return `
                    <div class="nft-card ${isOwned ? '' : 'locked'}">
                        <div class="nft-img-box">
                            ${!isOwned ? `<div class="lock-badge">${i.price} 🪙</div>` : ''}
                            <img src="${i.img || 'https://placeholder.com'}">
                        </div>
                        <div style="font-weight:800; font-size:13px;">${i.name}</div>
                        ${isOwned ? `<div style="color:var(--success); font-size:10px; margin-top:5px; font-weight:800;">ВЛАДЕЛЕЦ</div>` : 
                        `<button onclick="buy(${i.id}, ${i.price})" style="background:#fff; border:none; border-radius:10px; padding:8px; width:100%; margin-top:10px; font-weight:800; font-size:11px; cursor:pointer;">ОТКРЫТЬ</button>`}
                    </div>
                `;
            }).join('');
        }

        window.buy = (id, p) => {
            if(coins >= p) { coins -= p; owned.push(id); updateStats(); renderNFTs(); }
            else alert("Недостаточно Vitya Coins!");
        }

        function updateStats() {
            localStorage.setItem(`${user}_coins`, coins);
            localStorage.setItem(`${user}_nfts`, JSON.stringify(owned));
            document.getElementById('coinCount').textContent = coins.toLocaleString();
        }

        function copyLink() {
            navigator.clipboard.writeText(`https://nftvitya.io{user}`);
            document.getElementById('copyStat').textContent = "ССЫЛКА СКОПИРОВАНА!";
            setTimeout(() => document.getElementById('copyStat').textContent = "Нажми для копирования ссылки", 2000);
        }
    </script>
</body>
</html>
